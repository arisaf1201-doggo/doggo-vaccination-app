<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 わんこ健康手帳</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FDF6EE;--card:#fff;--border:#EDE4D8;--text:#3D2C1E;--muted:#9B8272}
body{background:var(--bg);font-family:'Zen Maru Gothic',sans-serif;color:var(--text)}
.app{min-height:100vh;max-width:480px;margin:0 auto;padding:0 0 80px}
.header{background:var(--card);border-bottom:2px solid var(--border);padding:20px;position:sticky;top:0;z-index:100}
.header-title{font-size:20px;font-weight:700}
.dog-tabs{display:flex;gap:8px;margin-top:12px;overflow-x:auto}
.dog-tab{padding:8px 14px;border-radius:20px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap}
.dog-tab.active{color:#fff}
.content{padding:16px}
.section-tabs{display:flex;background:var(--border);border-radius:12px;padding:4px;margin-bottom:16px}
.section-tab{flex:1;padding:10px;border-radius:9px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted)}
.section-tab.active{background:var(--card);color:var(--text)}
.vaccine-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.vaccine-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.vaccine-name{font-size:15px;font-weight:700}
.edit-btn{color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer}
.history-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.history-item{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:8px 10px;background:var(--bg);border-radius:8px}
.history-date{color:var(--text);font-weight:600}
.history-next{color:var(--muted);font-size:12px}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px}
.add-form{display:flex;gap:8px;margin-top:8px;padding-top:10px;border-top:1px solid var(--border)}
.date-input{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px}
.save-btn{color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer}
.cancel-btn{background:var(--border);color:var(--muted);border:none;border-radius:8px;padding:8px 10px;cursor:pointer}
.status-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted)}
.hw-header{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.hw-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hw-month{aspect-ratio:1;border-radius:12px;border:2px solid var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:1px;padding:4px}
.hw-month.done{color:#fff}
.hw-month.future{opacity:0.5}
.hw-month-name{font-size:11px;font-weight:700}
.hw-check{font-size:16px}
.hw-month-date{font-size:9px;color:var(--muted)}
.hw-month-due{font-size:8px;color:#E65100}
.hw-month.done .hw-month-date,.hw-month.done .hw-month-name{color:rgba(255,255,255,0.9)}
.hw-progress{margin-top:14px;background:var(--card);border-radius:12px;border:1.5px solid var(--border);padding:14px}
.hw-progress-label{font-size:13px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.hw-bar{height:10px;background:var(--border);border-radius:99px;overflow:hidden}
.hw-fill{height:100%;border-radius:99px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:20px;padding:24px;width:88%;max-width:360px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.ov-list{display:flex;flex-direction:column;gap:10px}
.ov-dog{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px}
.ov-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-weight:700}
.ov-dot{width:12px;height:12px;border-radius:50%}
.ov-item{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin-bottom:4px}
.badge{padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700}
.b-ok{background:#E8F5E9;color:#388E3C}
.b-soon{background:#FFF3E0;color:#E65100}
.b-over{background:#FFEBEE;color:#C62828}
.b-none{background:var(--border);color:var(--muted)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;display:none;z-index:999}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:2px solid var(--border);display:flex;padding:8px 0 16px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;font-size:10px;color:var(--muted);font-weight:700}
.nav-icon{font-size:22px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">🐾 わんこ健康手帳</div>
    <div class="dog-tabs" id="dogTabs"></div>
  </div>
  <div id="alerts" style="padding:12px 16px 0"></div>
  <div class="content" id="content"></div>
  <div class="bottom-nav">
    <button class="nav-btn" id="nV" onclick="setTab('vaccines')"><span class="nav-icon">💉</span>ワクチン</button>
    <button class="nav-btn" id="nH" onclick="setTab('heartworm')"><span class="nav-icon">💊</span>フィラリア</button>
    <button class="nav-btn" id="nO" onclick="setTab('overview')"><span class="nav-icon">📋</span>一覧</button>
  </div>
  <div class="toast" id="toast"></div>
  <div class="modal-bg" id="modal" style="display:none">
    <div class="modal">
      <div class="modal-title" id="modal-title"></div>
      <input type="date" class="date-input" id="modal-date" style="width:100%">
      <div class="modal-btns">
        <button class="save-btn" id="modal-save" style="flex:1">保存</button>
        <button class="cancel-btn" onclick="closeModal()">✕</button>
      </div>
    </div>
  </div>
</div>
<script>
var DOGS=[{id:"koharu",name:"こはる",emoji:"🐕",color:"#E8956D"},{id:"noel",name:"Noël",emoji:"🐩",color:"#7EB8C9"},{id:"elmo",name:"エルモ",emoji:"🦮",color:"#C97EB8"},{id:"ralph",name:"ラルフ",emoji:"🐶",color:"#7EC97E"}];
var VACCINES=[{id:"mixed",name:"混合ワクチン",icon:"💉",im:12},{id:"rabies",name:"狂犬病",icon:"🔴",im:12}];
var MONTHS=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
var now=new Date(),CY=now.getFullYear(),CM=now.getMonth()+1;
function initR(){return Object.fromEntries(DOGS.map(function(d){return[d.id,{vaccines:Object.fromEntries(VACCINES.map(function(v){return[v.id,[]]})),hw:Object.fromEntries(Array.from({length:12},function(_,i){return[i+1,""]}))}]}))}
var REC=(function(){try{var s=localStorage.getItem("wanko4");return s?JSON.parse(s):initR()}catch(e){return initR()}})();
var AD=DOGS[0].id,AT="vaccines",EV=null;
function save(){try{localStorage.setItem("wanko4",JSON.stringify(REC))}catch(e){}}
function fd(s){if(!s)return"未記録";var d=new Date(s+"T00:00:00");return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日"}
function fds(s){if(!s)return"";var d=new Date(s+"T00:00:00");return(d.getMonth()+1)+"/"+d.getDate()}
function nd(s,m){if(!s)return null;var d=new Date(s+"T00:00:00");d.setMonth(d.getMonth()+m);return d}
function du(d){if(!d)return null;var t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)}
function bh(days){if(days===null)return'<span class="badge b-none">未記録</span>';if(days<0)return'<span class="badge b-over">期限切れ</span>';if(days<=30)return'<span class="badge b-soon">あと'+days+'日</span>';return'<span class="badge b-ok">あと'+days+'日</span>'}
function dc(){return DOGS.find(function(d){return d.id===AD}).color}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none"},2000)}
function openModal(title,cur,onSave){var dog=DOGS.find(function(d){return d.id===AD});document.getElementById("modal-title").textContent=title;document.getElementById("modal-date").value=cur||"";var sb=document.getElementById("modal-save");sb.style.background=dog.color;sb.onclick=onSave;document.getElementById("modal").style.display="flex"}
function closeModal(){document.getElementById("modal").style.display="none"}
function renderTabs(){document.getElementById("dogTabs").innerHTML=DOGS.map(function(d){var a=AD===d.id;return'<button class="dog-tab'+(a?" active":"")+'" style="'+(a?"background:"+d.color+";border-color:"+d.color+";":"")+'" onclick="sd(\''+d.id+'\')">'+d.emoji+" "+d.name+"</button>"}).join("")}
function sd(id){AD=id;EV=null;render()}
function latestVax(dogId,vid){var arr=REC[dogId].vaccines[vid];if(!arr||!arr.length)return null;return arr.slice().sort().pop()}
function renderAlerts(){var al=[];DOGS.forEach(function(d){var r=REC[d.id];VACCINES.forEach(function(v){var ld=latestVax(d.id,v.id),due=nd(ld,v.im),days=du(due);if(days!==null&&days<=30)al.push(d.name+"の"+v.name+"（あと"+days+"日）")});if(!r.hw[CM])al.push(d.name+"のフィラリア（"+MONTHS[CM-1]+"）未投与")});document.getElementById("alerts").innerHTML=al.slice(0,4).map(function(a){return'<div style="background:#FFF5F0;border:1.5px solid #FFD4B8;border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:13px">⚠️ '+a+"</div>"}).join("")}
function setTab(t){AT=t;EV=null;render()}
function render(){
renderTabs();renderAlerts();
var dog=DOGS.find(function(d){return d.id===AD});
["nV","nH","nO"].forEach(function(id,i){document.getElementById(id).style.color=["vaccines","heartworm","overview"][i]===AT?dc():""});
var c=document.getElementById("content");
var st='<div class="section-tabs"><button class="section-tab'+(AT==="vaccines"?" active":"")+'" onclick="setTab(\'vaccines\')">💉 ワクチン</button><button class="section-tab'+(AT==="heartworm"?" active":"")+'" onclick="setTab(\'heartworm\')">💊 フィラリア</button></div>';
if(AT==="vaccines"){
var r=REC[AD];
c.innerHTML=st+VACCINES.map(function(v){
var arr=(r.vaccines[v.id]||[]).slice().sort().reverse();
var ld=arr[0]||null;
var due=nd(ld,v.im),days=du(due),ds=due?fd(due.toISOString().split("T")[0]):"—";
var ed=EV===v.id;
var histHTML=arr.length?arr.map(function(date,i){return'<div class="history-item"><div><div class="history-date">'+fd(date)+'</div><div class="history-next" style="font-size:11px;color:var(--muted)">次回: '+fd(nd(date,v.im).toISOString().split("T")[0])+'</div></div><button class="del-btn" onclick="delVax(\''+v.id+'\','+i+')">🗑</button></div>'}).join(""):'<div style="font-size:13px;color:var(--muted);padding:4px 0">記録なし</div>';
return'<div class="vaccine-card"><div class="vaccine-header"><div class="vaccine-name">'+v.icon+" "+v.name+'</div><button class="edit-btn" style="background:'+dog.color+'" onclick="te(\''+v.id+'\')">'+( ed?"✕ 閉じる":"＋ 追加")+'</button></div><div class="history-list">'+histHTML+'</div>'+(arr.length?'<div class="status-row"><span>次回予定</span>'+bh(days)+'</div>':"")+(ed?'<div class="add-form"><input type="date" class="date-input" id="di'+v.id+'"><button class="save-btn" style="background:'+dog.color+'" onclick="sv(\''+v.id+'\')">保存</button><button class="cancel-btn" onclick="ce()">✕</button></div>':"")+"</div>"}).join("");
}else if(AT==="heartworm"){
var r=REC[AD];var gv=Object.values(r.hw).filter(Boolean).length,pct=Math.round(gv/CM*100);
c.innerHTML=st+'<div class="hw-header">'+dog.emoji+" "+dog.name+'のフィラリア予防 <span style="font-size:13px;color:var(--muted)">'+CY+'年</span></div><div class="hw-grid">'+Array.from({length:12},function(_,i){var m=i+1,date=r.hw[m],done=!!date,ic=m===CM,ifu=m>CM&&!done,bg=done?"background:"+dog.color+";border-color:"+dog.color+";":ic?"border-color:"+dog.color+";":"";var dueStr="";if(!done&&m<=CM){var prev=r.hw[m-1];if(prev){var due=nd(prev,1);var days=du(due);dueStr=days<0?"期限切れ":"期限:"+fds(due.toISOString().split("T")[0])}}return'<button class="hw-month'+(done?" done":"")+(ifu?" future":"")+'" style="'+bg+'" onclick="thm('+m+')"><span class="hw-month-name">'+MONTHS[m-1]+'</span><span class="hw-check">'+(done?"✅":"⭕")+'</span><span class="hw-month-date">'+(done?fds(date):(ic?"今月":"未投与"))+'</span>'+(dueStr?'<span class="hw-month-due">'+dueStr+"</span>":"")+"</button>"}).join("")+'</div><div class="hw-progress"><div class="hw-progress-label"><span>今年の投与率</span><span style="color:'+dog.color+';font-weight:700">'+gv+"/"+CM+"ヶ月 ("+pct+'%)</span></div><div class="hw-bar"><div class="hw-fill" style="width:'+pct+"%;background:"+dog.color+'"></div></div></div>';
}else{
c.innerHTML='<div style="font-size:18px;font-weight:700;margin-bottom:14px">📋 全犬の状況</div><div class="ov-list">'+DOGS.map(function(d){var r=REC[d.id],hw=r.hw[CM];return'<div class="ov-dog"><div class="ov-head"><div class="ov-dot" style="background:'+d.color+'"></div>'+d.emoji+" "+d.name+'</div>'+VACCINES.map(function(v){var ld=latestVax(d.id,v.id),due=nd(ld,v.im);return'<div class="ov-item"><span>'+v.icon+" "+v.name+"</span>"+bh(du(due))+"</div>"}).join("")+'<div class="ov-item"><span>💊 フィラリア（今月）</span><span class="badge '+(hw?"b-ok":"b-soon")+'">'+(hw?"投与済":"未投与")+"</span></div></div>"}).join("")+"</div>";
}}
function te(id){EV=EV===id?null:id;render()}
function ce(){EV=null;render()}
function sv(id){var inp=document.getElementById("di"+id);if(!inp||!inp.value)return;if(!REC[AD].vaccines[id])REC[AD].vaccines[id]=[];REC[AD].vaccines[id].push(inp.value);save();EV=null;render();toast("✅ 保存しました")}
function delVax(vid,idx){var arr=REC[AD].vaccines[vid].slice().sort().reverse();arr.splice(idx,1);REC[AD].vaccines[vid]=arr;save();render();toast("🗑 削除しました")}
function thm(m){var cur=REC[AD].hw[m];if(cur){REC[AD].hw[m]="";save();render();return}openModal(MONTHS[m-1]+"の投与日",new Date().toISOString().split("T")[0],function(){var v=document.getElementById("modal-date").value;if(!v)return;REC[AD].hw[m]=v;save();closeModal();render();toast("✅ 保存しました")})}
render();
</script>
</body>
</html>
